<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>컴맹 구조대</title>
<link href="[https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800;900&display=swap](https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800;900&display=swap)" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Pretendard', sans-serif; }
body{ background:#ffffff; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; overflow: hidden; color: #1e293b; }

/* 🌟 로고 레이아웃 */
.brand-logo { display: inline-flex; align-items: center; justify-content: center; font-size: 72px; letter-spacing: -3px; margin-bottom: 10px; user-select: none; color: #0f172a; font-weight: 900; }
.brand-logo .blue-text {
    background: linear-gradient(180deg, #1e3a8a 0%, #2563eb 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* 🛟 만화풍 귀여운 튜브 마크 (그림자 정제 완료) */
.invoko-tube-wrapper {
    width: 68px; height: 68px; border-radius: 50%;
    background: #1e3a8a; display: inline-flex; align-items: center; justify-content: center;
    position: relative; margin: 0 8px; transform: translateY(8px);
    box-shadow: 0 8px 20px rgba(30, 58, 138, 0.12); 
}
.cartoon-tube {
    width: 48px; height: 48px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ffffff 0%, #f3f4f6 50%, #e5e7eb 100%);
    border: 5.5px solid #0f172a; position: relative; overflow: hidden;
}
.cartoon-tube::before {
    content: ''; position: absolute; top: -10%; left: -10%; width: 120%; height: 120%;
    background: conic-gradient(transparent 0deg 40deg, #ef4444 40deg 65deg, transparent 65deg 130deg, #ef4444 130deg 155deg, transparent 155deg 220deg, #ef4444 220deg 245deg, transparent 245deg 310deg, #ef4444 310deg 335deg, transparent 335deg);
    border-radius: 50%; z-index: 1;
}
.cartoon-tube-hole {
    position: absolute; top: 50%; left: 50%; width: 18px; height: 18px;
    background: #1e3a8a; border: 5.5px solid #0f172a; border-radius: 50%;
    transform: translate(-50%, -50%); z-index: 2;
}

.container{ width:100%; max-width:900px; background:#ffffff; padding:20px; text-align: center; }
.subtitle { font-size: 16px; color: #64748b; margin-bottom: 40px; font-weight: 600; }

textarea{ width:100%; height:200px; padding:25px; border-radius: 20px; border: 1.5px solid #e2e8f0; background: #f8fafc; resize:none; outline:none; font-size:16px; line-height: 1.6; color: #334155; }
textarea:focus{ border-color:#3b82f6; background: #ffffff; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.05); }

.btn-primary { width: 100%; margin-top: 25px; padding: 20px; border: none; border-radius: 20px; background: linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%); color: white; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.15); transition: 0.3s; }
.btn-primary:hover{ transform: translateY(-2px); box-shadow: 0 15px 25px rgba(37, 99, 235, 0.25); }

/* 🎯 로딩창 활성화 시 뒷화면 흐리게(Blur) 투영 */
.loading-overlay { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(255, 255, 255, 0.5); 
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 40px; 
}
.loading-text { font-size: 24px; font-weight: 900; color: #1e3a8a; margin-bottom: 25px; }

/* 🌊 바 안에 % 매립형 프로그래스 바 */
.progress-container { width: 100%; max-width: 500px; height: 38px; background: #f1f5f9; border-radius: 50px; overflow: hidden; border: 3px solid #1e3a8a; position: relative; box-shadow: 0 8px 25px rgba(0,0,0,0.05); }
.progress-bar { 
    width: 0%; height: 100%; 
    background: linear-gradient(180deg, #60a5fa 0%, #2563eb 100%); 
    border-radius: 50px; transition: width 0.15s linear; position: relative;
    display: flex; align-items: center; justify-content: flex-end;
}
.percent-inside {
    color: white; font-size: 14px; font-weight: 900; margin-right: 15px; position: absolute; right: 0;
    font-variant-numeric: tabular-nums; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}
.progress-bar::after {
    content: ''; position: absolute; right: -20px; top: -50%; width: 40px; height: 200%;
    background: rgba(255,255,255,0.22); border-radius: 42%; animation: waveRotate 1.8s infinite linear;
}
@keyframes waveRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* 🫧 0.5초 초고속 3배 스케일업(600개 이상) 흩뿌리기 물방울 파도 기구 */
.bubble-curtain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; display: none; pointer-events: none; }
.bubble-particle {
    position: absolute; bottom: -180px;
    background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.95) 0%, rgba(191, 219, 254, 0.5) 45%, rgba(37, 99, 235, 0.45) 85%, rgba(29, 78, 216, 0.6) 100%);
    border: 1px solid rgba(255, 255, 255, 0.95); border-radius: 50%;
    box-shadow: inset -4px -4px 10px rgba(37, 99, 235, 0.15), 0 4px 8px rgba(37, 99, 235, 0.1);
    opacity: 0;
    animation: youtubeBubbleRise 0.50s cubic-bezier(0.25, 1, 0.5, 1) forwards; /* 0.5초 타임어택 탈출 */
}
@keyframes youtubeBubbleRise {
    0% { transform: translateY(0) scale(0.2) translateX(0); opacity: 0; }
    5% { opacity: 1; }
    /* 사방으로 흩뿌려지며 수직 주행 기믹 구현 */
    50% { transform: translateY(-50vh) scale(1.1) translateX(var(--scatter-x)); }
    100% { transform: translateY(-145vh) scale(1.4) translateX(var(--scatter-x-end)); opacity: 1; }
}
.bubble-particle.pop-out { animation: youtubeBubblePop 0.1s ease-out forwards; }
@keyframes youtubeBubblePop { 0% { transform: scale(1.4); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }

/* 2페이지 결과 리포트 화면 */
.result-page { display: none; width: 100%; text-align: left; }
.report-header { display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }
.report-header h2 { font-size: 32px; font-weight: 900; color: #0f172a; letter-spacing: -1px; }

.card{ background:#ffffff; border-radius:24px; padding:30px; margin-top:20px; border: 1px solid #e2e8f0; box-shadow: 0 5px 20px rgba(0,0,0,0.02); }
.score-title { font-size:22px; font-weight:800; margin-bottom:15px; display: flex; align-items: center; gap: 8px; color: #1e3a8a; }

.badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 50px; font-size: 14px; font-weight: bold; }
.badge.green { background: #dcfce7; color: #15803d; }
.badge.yellow { background: #fef3c7; color: #b45309; }
.badge.red { background: #fee2e2; color: #b91c1c; }

.spec{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; margin-top:20px; }
.spec-box{ background:#f8fafc; border-radius:16px; padding:20px; border:1px solid #edf2f7; }
.spec-box strong { font-size: 13px; color: #64748b; letter-spacing: 0.5px; }
.spec-box p { font-size: 18px; font-weight: bold; color: #1e293b; margin-top: 5px; }

.game-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #f1f5f9; font-size: 16px; font-weight: 600; }
.game-item:last-child { border: none; }

.comment-box { padding: 20px; background: #f0fdf4; border-radius: 16px; margin-top: 15px; font-size: 16px; line-height: 1.6; color: #166534; font-weight: 500; }
.comment-box.warn { background: #fef2f2; color: #991b1b; }
.comment-box.normal { background: #fffbec; color: #92400e; }

.footer-text { margin-top: 80px; font-size: 12px; color: #94a3b8; text-align: center; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingScreen">
    <div class="loading-text">🧼 하드웨어 정밀 세척 진단 중...</div>
    <div class="progress-container">
        <div class="progress-bar" id="progressBar">
            <span class="percent-inside" id="percentText">0%</span>
        </div>
    </div>
</div>

<div class="bubble-curtain" id="bubbleCurtain"></div>
<audio id="bubbleSound" src="[https://assets.mixkit.co/active_storage/sfx/1110/1110-84.wav](https://assets.mixkit.co/active_storage/sfx/1110/1110-84.wav)" preload="auto"></audio>

<div class="container">
    <div id="inputPage">
        <div class="brand-logo">
            <span>컴맹</span>
            <div class="invoko-tube-wrapper">
                <div class="cartoon-tube"><div class="cartoon-tube-hole"></div></div>
            </div>
            <span>구조대</span>
        </div>
        <p class="subtitle">중고 컴퓨터 판매글을 붙여넣으면 AI가 시세와 사양을 감정합니다.</p>
        
        <textarea id="inputText" placeholder="당근마켓, 중고나라 매물의 사양과 가격이 포함된 판매글을 붙여넣어 주세요."></textarea>
        <button class="btn-primary" id="btn" onclick="analyze()">구조하기</button>
        
        <p class="footer-text">© 2026 컴맹구조대. All rights reserved.</p>
    </div>

    <div class="result-page" id="resultPage">
        <div class="report-header">
            <span class="blue-text" style="font-size:32px; font-weight:900;">컴맹</span>
            <div class="invoko-tube-wrapper" style="width:50px; height:50px; transform: translateY(4px); margin:0 4px;">
                <div class="cartoon-tube" style="width:36px; height:36px; border:4.5px solid #0f172a;"><div class="cartoon-tube-hole" style="width:12px; height:12px; border:4.5px solid #0f172a;"></div></div>
            </div>
            <span class="blue-text" style="font-size:32px; font-weight:900; margin-right:12px;">구조대</span>
            <h2>진단 리포트</h2>
        </div>
        
        <div id="result"></div>
        
        <button class="btn-primary" onclick="goBack()" style="background: linear-gradient(180deg, #3b82f6 0%, #1d4ed8 100%); margin-top:35px; box-shadow: 0 10px 25px rgba(37,99,235,0.2);">다시 구조하기</button>
        <p class="footer-text">© 2026 컴맹구조대. All rights reserved.</p>
    </div>
</div>

<script>
const errorMessages = [
    "🚨 구조대가 현장 주변에서 길을 잃었습니다. 서버 연결 상태를 확인해 주세요!",
    "🌊 폭풍우가 심해 구조선이 진입하지 못했습니다. 잠시 후 다시 시도해 주세요.",
    "🛟 구명 튜브가 유저분의 텍스트를 잡지 못했습니다. 올바른 본문글인지 확인해 주세요.",
    "🚑 구조대 차량에 연료(네트워크)가 부족합니다! 인터넷 연결을 체크해 주세요.",
    "📱 구조 본부(AI 서버)와 무전이 끊겼습니다. 서버 창이 켜져 있는지 확인하세요!",
    "🛠️ 구조 장비 세척 엔진에 과부하가 걸렸습니다. 다시 한번 버튼을 눌러주세요."
];

async function analyze(){
    const text = document.getElementById("inputText").value.trim();
    const resultDiv = document.getElementById("result");
    const btn = document.getElementById("btn");
    const loadingScreen = document.getElementById("loadingScreen");
    const progressBar = document.getElementById("progressBar");
    const percentText = document.getElementById("percentText");
    const bubbleCurtain = document.getElementById("bubbleCurtain");
    const bubbleSound = document.getElementById("bubbleSound");
    const inputPage = document.getElementById("inputPage");
    const resultPage = document.getElementById("resultPage");

    if(!text) { alert("분석할 중고글을 입력해주세요!"); return; }

    btn.disabled = true;
    loadingScreen.style.display = "flex";
    
    let currentPercent = 0;
    const progressInterval = setInterval(() => {
        if(currentPercent < 96) {
            currentPercent += Math.floor(Math.random() * 8) + 4;
            if(currentPercent > 96) currentPercent = 96;
            percentText.innerText = `${currentPercent}%`;
            progressBar.style.width = `${currentPercent}%`;
        }
    }, 50);

    try {
        const response = await fetch("http://localhost:5000/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: text })
        });
        if(!response.ok) throw new Error("서버 통신 실패");
        const data = await response.json();
        
        clearInterval(progressInterval);
        percentText.innerText = "100%";
        progressBar.style.width = "100%";

        setTimeout(() => {
            try { bubbleSound.play(); } catch(e) {}
            
            bubbleCurtain.style.display = "block";
            
            // 💡 [요청 반영] 3배 스케일 대폭 격상! 0.03초 간격 총 220개 초고속 폭격 흩뿌리기 시스템
            let baseDelay = 0;
            createWaveBubbles(baseDelay, 45);
            createWaveBubbles(baseDelay += 30, 35);
            createWaveBubbles(baseDelay += 30, 35);
            createWaveBubbles(baseDelay += 30, 35);
            createWaveBubbles(baseDelay += 30, 35);
            createWaveBubbles(baseDelay += 30, 35);

            // 0.38초 최고 조밀 임계 구간 진입 시 순간 교체 대기
            setTimeout(() => {
                loadingScreen.style.display = "none";
                inputPage.style.display = "none";
                resultPage.style.display = "block";

                let specHTML = '';
                const labels = { cpu: '중앙처리장치', gpu: '그래픽카드', ram: '메모리 용량' };
                for (const [key, value] of Object.entries(data.specs)) {
                    specHTML += `<div class="spec-box"><strong>${labels[key] || key.toUpperCase()}</strong><p>${value || '미확인'}</p></div>`;
                }

                let boxClass = 'comment-box';
                if(data.priceAnalysis.priceStatus === '비씀') boxClass = 'comment-box warn';
                else if(data.priceAnalysis.priceStatus === '적당') boxClass = 'comment-box normal';

                let gameHTML = '';
                data.games.forEach(game => {
                    let badgeHTML = '<span class="badge green">🟢 쾌적</span>';
                    if(game.status === '보통') badgeHTML = '<span class="badge yellow">🟡 보통</span>';
                    else if(game.status === '불가') badgeHTML = '<span class="badge red">🔴 불가</span>';
                    
                    gameHTML += `<div class="game-item"><span>${game.name}</span><div><span style="margin-right:12px; font-size:14px; color:#64748b;">${game.fps}</span>${badgeHTML}</div></div>`;
                });

                resultDiv.innerHTML = `
                    <div class="card">
                        <div class="score-title">💰 가격 가성비 분석 결과</div>
                        <div class="${boxClass}">
                            ${data.priceAnalysis.priceComment}
                        </div>
                        <div class="spec">${specHTML}</div>
                    </div>
                    <div class="card" style="margin-bottom: 20px;">
                        <div class="score-title">🎮 주요 게임 예상 구동 성능</div>
                        <div style="margin-top: 15px;">${gameHTML}</div>
                    </div>
                `;
            }, 380);

            // 0.85초 시점에 팝 아웃 클리어 완료
            setTimeout(() => {
                const particles = document.querySelectorAll('.bubble-particle');
                particles.forEach(p => p.classList.add('pop-out'));
                setTimeout(() => {
                    bubbleCurtain.style.display = "none";
                    bubbleCurtain.innerHTML = "";
                }, 100);
            }, 850);

        }, 500);

    } catch (err) {
        clearInterval(progressInterval);
        console.error(err);
        const randomErrorIndex = Math.floor(Math.random() * errorMessages.length);
        alert(errorMessages[randomErrorIndex]);
        loadingScreen.style.display = "none";
        progressBar.style.width = "0%";
    } finally {
        btn.disabled = false;
    }
}

function createWaveBubbles(delayTime, perCount) {
    setTimeout(() => {
        const curtain = document.getElementById("bubbleCurtain");
        for (let i = 0; i < perCount; i++) {
            const bubble = document.createElement("div");
            bubble.classList.add("bubble-particle");
            
            // 물방울 크기 분산 (30px ~ 150px)
            const size = Math.random() * 120 + 30; 
            const xPosition = Math.random() * 100;
            const subDelay = Math.random() * 0.02;

            // 💡 [요청 반영] 사방으로 지그재그 흩뿌려지도록 CSS 무작위 변수 전달 구조화
            const scatterX = (Math.random() * 120 - 60) + "px";
            const scatterXEnd = (Math.random() * 200 - 100) + "px";
            bubble.style.setProperty('--scatter-x', scatterX);
            bubble.style.setProperty('--scatter-x-end', scatterXEnd);

            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${xPosition}%`;
            bubble.style.animationDelay = `${subDelay}s`;

            curtain.appendChild(bubble);
        }
    }, delayTime);
}

function goBack() {
    document.getElementById("inputPage").style.display = "block";
    document.getElementById("resultPage").style.display = "none";
    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("progressBar").style.width = "0%";
    document.getElementById("percentText").innerText = "0%";
    document.getElementById("inputText").value = "";
}
</script>
</body>
</html>
