<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>컴맹 구조대 - AI 중고 PC 감정사</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0284c7;
            --bg-light: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-yellow: #eab308;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-light); color: var(--text-dark); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-x: hidden; position: relative; }
        
        .container { width: 90%; max-width: 700px; z-index: 10; margin: 20px auto; }
        
        /* 만화 스타일 로고 및 헤더 */
        header { text-align: center; margin-bottom: 30px; position: relative; }
        .logo-container { display: inline-block; position: relative; margin-bottom: 10px; }
        .tube-graphic { font-size: 4rem; display: inline-block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(5deg); } }
        
        header h1 { font-family: 'Jua', sans-serif; font-size: 3rem; color: var(--primary-color); text-shadow: 3px 3px 0px #e0f2fe; margin-top: 5px; }
        header p { color: var(--text-muted); font-size: 1.1rem; font-weight: 500; }

        /* 화이트 테마 대시보드 카드 */
        .card { background: var(--card-bg); padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(2, 132, 199, 0.08); border: 2px solid #e2e8f0; margin-bottom: 25px; transition: all 0.3s ease; }
        textarea { width: 100%; height: 180px; background: #f1f5f9; border: 2px solid #cbd5e1; border-radius: 16px; padding: 15px; color: var(--text-dark); font-size: 1rem; resize: none; outline: none; transition: all 0.3s; font-weight: 500; }
        textarea:focus { border-color: var(--primary-color); background: #ffffff; box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.15); }
        
        .btn { width: 100%; background: #0284c7; color: white; border: none; padding: 18px; border-radius: 16px; font-size: 1.3rem; font-family: 'Jua', sans-serif; cursor: pointer; transition: all 0.2s; margin-top: 15px; box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2); }
        .btn:hover { background: #0369a1; transform: translateY(-2px); box-shadow: 0 6px 18px rgba(2, 132, 199, 0.3); }
        .btn:active { transform: translateY(1px); }

        /* 로딩 컨테이너 */
        .loading-box { display: none; text-align: center; padding: 40px 20px; }
        .spinner { width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top: 5px solid var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-container { width: 100%; background: #e2e8f0; height: 12px; border-radius: 6px; margin-top: 20px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--primary-color); transition: width 0.1s linear; }

        /* 결과 화면 디자인 */
        .result-box { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .spec-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .spec-item { background: var(--card-bg); padding: 20px; border-radius: 18px; text-align: center; border: 2px solid #e2e8f0; border-bottom: 5px solid var(--primary-color); }
        .spec-item span { display: block; font-size: 0.9rem; color: var(--text-muted); font-weight: bold; margin-bottom: 5px; }
        .spec-item strong { font-size: 1.1rem; color: var(--text-dark); word-break: break-all; }

        .game-title { font-family: 'Jua', sans-serif; font-size: 1.5rem; color: var(--text-dark); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .game-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #e2e8f0; }
        .game-row:last-child { border-bottom: none; }
        .badge { padding: 6px 14px; border-radius: 50px; font-size: 0.9rem; font-weight: bold; }
        .badge.쾌적 { background: #dcfce7; color: var(--accent-green); }
        .badge.보통 { background: #fef9c3; color: var(--accent-yellow); }
        .badge.불가 { background: #fee2e2; color: var(--accent-red); }

        .price-card { text-align: center; padding: 25px; border-radius: 20px; transition: all 0.3s; }
        .price-card.개이득 { background: #f0fdf4; border: 2px solid var(--accent-green); }
        .price-card.적당 { background: #fefce8; border: 2px solid var(--accent-yellow); }
        .price-card.비씀 { background: #fff5f5; border: 2px solid var(--accent-red); }
        .price-large { font-family: 'Jua', sans-serif; font-size: 2.2rem; margin: 10px 0; color: var(--text-dark); }
        .comment-text { background: #ffffff; padding: 15px; border-radius: 12px; color: #475569; line-height: 1.6; border: 1px solid #e2e8f0; margin-top: 10px; font-weight: 500; }

        .btn-reset { width: 100%; background: #64748b; color: white; border: none; padding: 16px; border-radius: 16px; font-size: 1.2rem; font-family: 'Jua', sans-serif; cursor: pointer; margin-top: 25px; transition: background 0.2s; }
        .btn-reset:hover { background: #475569; }

        /* 화면 전환 물방울 연출 */
        .bubble { position: absolute; background: radial-gradient(circle at 30% 30%, rgba(56, 189, 248, 0.6), rgba(2, 132, 199, 0.1)); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); box-shadow: inset 0 0 8px rgba(255,255,255,0.6), 0 0 12px rgba(56,189,248,0.2); z-index: 9999; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-container">
                <span class="tube-graphic">🛟</span>
            </div>
            <h1>컴맹 구조대</h1>
            <p>중고 PC 매물 글을 복사해 붙여넣으세요. AI가 가성비를 구조합니다!</p>
        </header>

        <!-- 메인 입력 카드 -->
        <div class="card" id="formBox">
            <textarea id="pcText" placeholder="여기에 당근마켓이나 중고나라 판매글 내용을 그대로 복사해서 붙여넣어 주세요!&#10;예) CPU i5-12400F, RTX 3060, 램 16G 팝니다..."></textarea>
            <button class="btn" onclick="startRescue()">🚀 구조대 출동 (감정 시작)</button>
        </div>

        <!-- 로딩 대시보드 -->
        <div class="card loading-box" id="loadingBox">
            <div class="spinner"></div>
            <h2 id="loadingText" style="color: var(--primary-color); font-family: 'Jua', sans-serif; font-size: 1.8rem;">AI 구조대 분석 데이터 수집 중...</h2>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div id="progressPercent" style="margin-top: 10px; font-weight: bold; color: var(--primary-color); font-size: 1.2rem;">0%</div>
        </div>

        <!-- 최종 결과 카드 -->
        <div class="result-box" id="resultBox">
            <div class="spec-grid">
                <div class="spec-item"><span>중앙처리장치 (CPU)</span><strong id="resCpu">-</strong></div>
                <div class="spec-item"><span>그래픽카드 (GPU)</span><strong id="resGpu">-</strong></div>
                <div class="spec-item"><span>메모리 용량 (RAM)</span><strong id="resRam">-</strong></div>
            </div>

            <div class="card">
                <div class="game-title">🎮 게임별 실구동 예상 프레임 성능</div>
                <div id="gameList"></div>
            </div>

            <div class="price-card" id="priceCard">
                <h3 id="priceTitle" style="font-family: 'Jua', sans-serif; font-size: 1.4rem;">AI 가성비 최종 판정</h3>
                <div class="price-large" id="normalPriceText">0원</div>
                <p class="comment-text" id="priceComment">-</p>
            </div>

            <button class="btn-reset" onclick="resetForm()">🔄 다른 매물 새로 감정하기</button>
        </div>
    </div>

    <script>
        let progressInterval;

        function createBubbles() {
            // 🎈 마음에 들어 하셨던 오리지널 물방울 폭사 연출 효과
            for (let i = 0; i < 600; i++) {
                const bubble = document.createElement('div');
                bubble.classList.add('bubble');
                const size = Math.random() * 25 + 5;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.style.left = '50%';
                bubble.style.top = '50%';
                document.body.appendChild(bubble);
                
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * window.innerWidth * 0.9;
                const destX = Math.cos(angle) * distance;
                const destY = Math.sin(angle) * distance;
                const duration = Math.random() * 1.4 + 0.7;
                
                bubble.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${destX}px), calc(-50% + ${destY}px)) scale(0)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    easing: 'cubic-bezier(0.1, 0.8, 0.2, 1)',
                    fill: 'forwards'
                });
                
                setTimeout(() => { bubble.remove(); }, duration * 1000);
            }
        }

        async function startRescue() {
            const text = document.getElementById("pcText").value.trim();
            if(!text) { alert("감정할 내용을 입력해 주세요!"); return; }

            document.getElementById("formBox").style.display = "none";
            document.getElementById("loadingBox").style.display = "block";

            let percent = 0;
            const progressBar = document.getElementById("progressBar");
            const progressPercent = document.getElementById("progressPercent");
            const loadingText = document.getElementById("loadingText");

            progressInterval = setInterval(() => {
                if (percent < 96) {
                    percent += Math.random() * 2;
                    if(percent > 96) percent = 96;
                    const rounded = Math.round(percent);
                    progressBar.style.width = `${rounded}%`;
                    progressPercent.innerText = `${rounded}%`;

                    if(rounded > 70) loadingText.innerText = "시장 중고 시세 데이터 맵핑 중...";
                    else if(rounded > 40) loadingText.innerText = "제미나이 AI 스펙 조합 연산 중...";
                    else if(rounded > 15) loadingText.innerText = "텍스트 본문 하드웨어 파싱 중...";
                }
            }, 70);

            try {
                // 🚀 인터넷 구름 위 Render 백엔드 주소로 정확하게 매칭 완료!
                const response = await fetch("https://com-rescue-backend.onrender.com/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) throw new Error("서버 에러 발생");
                const data = await response.json();

                clearInterval(progressInterval);
                progressBar.style.width = "100%";
                progressPercent.innerText = "100%";
                
                setTimeout(() => {
                    createBubbles(); // 화면 전환 물방울쇼 가동
                    showResult(data);
                }, 300);

            } catch (err) {
                clearInterval(progressInterval);
                alert("AI 서버 연결에 실패했거나 트래픽이 만료되었습니다. 잠시 후 다시 시도해 주세요!");
                resetForm();
            }
        }

        function showResult(data) {
            document.getElementById("loadingBox").style.display = "none";
            document.getElementById("resultBox").style.display = "block";

            document.getElementById("resCpu").innerText = data.specs.cpu;
            document.getElementById("resGpu").innerText = data.specs.gpu;
            document.getElementById("resRam").innerText = data.specs.ram;

            const gameList = document.getElementById("gameList");
            gameList.innerHTML = "";
            data.games.forEach(game => {
                gameList.innerHTML += `
                    <div class="game-row">
                        <span style="font-weight: 600; color: var(--text-dark);">${game.name}</span>
                        <div>
                            <span style="margin-right: 15px; color: var(--text-muted); font-weight: bold; font-size: 1.05rem;">${game.fps}</span>
                            <span class="badge ${game.status}">${game.status}</span>
                        </div>
                    </div>
                `;
            });

            const card = document.getElementById("priceCard");
            card.className = `price-card ${data.priceAnalysis.priceStatus}`;
            
            document.getElementById("priceTitle").innerText = `AI 가성비 최종 판정: [${data.priceAnalysis.priceStatus}]`;
            document.getElementById("normalPriceText").innerText = `부품 적정가 합산: ${data.priceAnalysis.calculatedNormalPrice.toLocaleString()}원`;
            document.getElementById("priceComment").innerText = data.priceAnalysis.priceComment;
        }

        function resetForm() {
            document.getElementById("resultBox").style.display = "none";
            document.getElementById("loadingBox").style.display = "none";
            document.getElementById("formBox").style.display = "block";
            document.getElementById("pcText").value = "";
            document.getElementById("progressBar").style.width = "0%";
            document.getElementById("progressPercent").innerText = "0%";
            document.getElementById("loadingText").innerText = "AI 구조대 분석 데이터 수집 중...";
        }
    </script>
</body>
</html>
